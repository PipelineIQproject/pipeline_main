apiVersion: apps/v1
kind: Deployment
metadata:
  name: keyvault-secret-sync
  namespace: pipelineiq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keyvault-secret-sync
  template:
    metadata:
      labels:
        app: keyvault-secret-sync
    spec:
      containers:
        - name: sync
          image: busybox:1.36
          command: ["sh", "-c", "while true; do sleep 3600; done"]
          volumeMounts:
            - name: keyvault-secrets
              mountPath: "/mnt/secrets-store"
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: keyvault-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: pipelineiq-keyvault-secrets
