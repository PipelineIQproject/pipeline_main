apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pipelineiq-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/PipelineIQproject/pipeline_main.git
    targetRevision: dev
    path: argocd
    directory:
      recurse: true
      exclude: '{**/helm/**}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
