apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.keyVault.secretProviderClassName }}
  namespace: {{ .Values.namespace }}
spec:
  provider: azure
  secretObjects:
    - secretName: {{ .Values.keyVault.syncedSecretName }}
      type: Opaque
      data:
{{- range .Values.keyVault.objects }}
        - objectName: {{ .objectName }}
          key: {{ .envKey }}
{{- end }}
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: {{ .Values.keyVault.userAssignedIdentityID | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    objects: |
      array:
{{- range .Values.keyVault.objects }}
        - |
          objectName: {{ .objectName }}
          objectType: secret
{{- end }}
