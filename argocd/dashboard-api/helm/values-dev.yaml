name: dashboard-api
namespace: pipelineiq-dev
replicaCount: 1

image:
  repository: nimeshsv814/final_capstone-dashboard-api
  tag: v1.0.5
  pullPolicy: IfNotPresent

containerPort: 8080

service:
  port: 8080
  targetPort: 8080

rollout:
  autoPromotionEnabled: true
  scaleDownDelaySeconds: 30

probes:
  enabled: true
  readinessPath: /health
  livenessPath: /health

keyvaultMount:
  enabled: true
  secretProviderClass: pipelineiq-keyvault-secrets

keyVaultEnv:
  enabled: true

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false

resources:
  requests:
    cpu: 50m
    memory: 48Mi
  limits:
    cpu: 250m
    memory: 256Mi
