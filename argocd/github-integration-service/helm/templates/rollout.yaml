apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: {{ .Values.name }}
  strategy:
    blueGreen:
      activeService: {{ .Values.name }}
      previewService: {{ .Values.name }}-preview
      autoPromotionEnabled: {{ .Values.rollout.autoPromotionEnabled }}
      scaleDownDelaySeconds: {{ .Values.rollout.scaleDownDelaySeconds }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      containers:
        - name: {{ .Values.name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{ if .Values.keyVaultEnv.enabled }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              for file in /mnt/secrets-store/*; do
                [ -f "$file" ] || continue
                name="$(basename "$file" | tr '[:lower:]-' '[:upper:]_')"
                export "$name=$(cat "$file")"
              done
              exec npm start
          {{ end }}
          {{ if .Values.containerPort }}
          ports:
            - containerPort: {{ .Values.containerPort }}
          {{ end }}
          securityContext:
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
            runAsGroup: {{ .Values.securityContext.runAsGroup }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            capabilities:
              drop:
                - ALL
          {{ if .Values.probes.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessPath }}
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 30
            periodSeconds: 20
          {{ end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          {{ if .Values.keyvaultMount.enabled }}
          volumeMounts:
            - name: keyvault-secrets
              mountPath: "/mnt/secrets-store"
              readOnly: true
          {{ end }}
      {{ if .Values.keyvaultMount.enabled }}
      volumes:
        - name: keyvault-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.keyvaultMount.secretProviderClass }}
      {{ end }}
