name: github-integration-service
namespace: pipelineiq-dev
replicaCount: 1

image:
  repository: npipelineiqproda81487xyepacr.azurecr.io/final_capstone-github-integration-service
  tag: v1.0.4
  pullPolicy: IfNotPresent

containerPort: 8082

service:
  port: 8082
  targetPort: 8082

rollout:
  autoPromotionEnabled: true
  scaleDownDelaySeconds: 30

probes:
  enabled: true
  readinessPath: /health
  livenessPath: /health

keyvaultMount:
  enabled: true
  secretProviderClass: pipelineiq-keyvault-secrets

keyVaultEnv:
  enabled: true

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false

resources:
  requests:
    cpu: 50m
    memory: 48Mi
  limits:
    cpu: 250m
    memory: 256Mi
