name: frontend
namespace: pipelineiq-prod
replicaCount: 2

image:
  repository: nimeshsv814/final_capstone-frontend
  tag: v1.0.9
  pullPolicy: IfNotPresent

containerPort: 8080

service:
  port: 80
  targetPort: 8080

rollout:
  autoPromotionEnabled: false
  scaleDownDelaySeconds: 30

probes:
  enabled: true
  readinessPath: /health
  livenessPath: /health

envFrom:
  enabled: false
  configMapName: pipelineiq-config
  secretName: pipelineiq-kv-secrets

keyvaultMount:
  enabled: false
  secretProviderClass: pipelineiq-keyvault-secrets

securityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  allowPrivilegeEscalation: false

resources:
  requests:
    cpu: 50m
    memory: 48Mi
  limits:
    cpu: 250m
    memory: 128Mi
