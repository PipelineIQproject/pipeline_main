namespace: pipelineiq
replicaCount: 1

image:
  repository: pipelineiqproda81487xyepacr.azurecr.io/final_capstone-dashboard-api
  tag: v1.0.5

containerPort: 8080

service:
  enabled: true
  port: 8080
  targetPort: 8080

envFrom:
  configMapName: pipelineiq-config
  secretName: pipelineiq-kv-secrets

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  cpuAverageUtilization: 70

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false

resources:
  requests:
    cpu: 50m
    memory: 48Mi
  limits:
    cpu: 250m
    memory: 256Mi
