apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemini-ai-service
  namespace: pipelineiq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gemini-ai-service
  template:
    metadata:
      labels:
        app: gemini-ai-service
    spec:
      containers:
        - name: gemini-ai-service
          image: nimeshsv814/final_capstone-gemini-ai-service:v1.0.5
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: pipelineiq-config
            - secretRef:
                name: pipelineiq-kv-secrets
          resources:
            requests:
              cpu: 75m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 384Mi
          volumeMounts:
            - name: keyvault-secrets
              mountPath: "/mnt/secrets-store"
              readOnly: true
      volumes:
        - name: keyvault-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: pipelineiq-keyvault-secrets
---
