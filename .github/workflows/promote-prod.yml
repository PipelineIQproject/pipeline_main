name: Promote Image To Production

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: "Service name"
        required: true
        type: string
        default: "frontend"

      image_name:
        description: "ACR image name"
        required: true
        type: string
        default: "final_capstone-frontend"

      chart_path:
        description: "Helm chart path"
        required: true
        type: string
        default: "frontend"

      dev_branch:
        description: "Branch where values-dev.yaml exists"
        required: true
        type: string
        default: "dev"

      prod_branch:
        description: "Branch where values-prod.yaml exists"
        required: true
        type: string
        default: "main"

      prod_image_tag:
        description: "Production semantic tag, example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote-prod:
    name: Promote To Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout dev branch to read values-dev.yaml
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.dev_branch }}
          path: dev-helm

      - name: Read dev image tag from values-dev.yaml
        id: dev_image
        shell: bash
        run: |
          DEV_TAG=$(python - <<'PY'
          from pathlib import Path

          path = Path("dev-helm") / "${{ inputs.chart_path }}" / "values-dev.yaml"
          lines = path.read_text().splitlines()

          in_image = False
          for line in lines:
              stripped = line.strip()

              if stripped == "image:":
                  in_image = True
                  continue

              if in_image and line and not line.startswith((" ", "\t")):
                  in_image = False

              if in_image and stripped.startswith("tag:"):
                  print(stripped.split(":", 1)[1].strip().strip('"').strip("'"))
                  break
          PY
          )

          if [ -z "$DEV_TAG" ]; then
            echo "Could not read dev image tag from values-dev.yaml"
            exit 1
          fi

          echo "dev_tag=$DEV_TAG" >> "$GITHUB_OUTPUT"
          echo "Dev image tag found: $DEV_TAG"

      - name: Checkout prod branch to update values-prod.yaml
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.prod_branch }}
          path: prod-helm

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Pull dev image, retag as prod, and push
        shell: bash
        run: |
          DEV_IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:${{ steps.dev_image.outputs.dev_tag }}"
          PROD_IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:${{ inputs.prod_image_tag }}"

          docker pull "$DEV_IMAGE"
          docker tag "$DEV_IMAGE" "$PROD_IMAGE"
          docker push "$PROD_IMAGE"

      - name: Update values-prod.yaml
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("prod-helm") / "${{ inputs.chart_path }}" / "values-prod.yaml"
          repository = "${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}"
          tag = "${{ inputs.prod_image_tag }}"

          lines = path.read_text().splitlines()
          out = []
          in_image = False

          for line in lines:
              stripped = line.strip()

              if stripped == "image:":
                  in_image = True
                  out.append(line)
                  continue

              if in_image and line and not line.startswith((" ", "\t")):
                  in_image = False

              if in_image and stripped.startswith("repository:"):
                  indent = line[:len(line) - len(line.lstrip())]
                  out.append(f"{indent}repository: {repository}")
              elif in_image and stripped.startswith("tag:"):
                  indent = line[:len(line) - len(line.lstrip())]
                  out.append(f"{indent}tag: {tag}")
              else:
                  out.append(line)

          path.write_text("\n".join(out) + "\n")
          PY

      - name: Commit and push prod values
        working-directory: prod-helm
        shell: bash
        run: |
          git config user.name "pipelineiq-ci"
          git config user.email "pipelineiq-ci@users.noreply.github.com"

          git add "${{ inputs.chart_path }}/values-prod.yaml"
          git diff --cached --quiet && exit 0

          git commit -m "ci: promote ${{ inputs.service_name }} image ${{ inputs.prod_image_tag }}"
          git push origin "${{ inputs.prod_branch }}"

  notify-email:
    name: Notify Email
    runs-on: ubuntu-latest
    needs:
      - promote-prod
    if: always()
    steps:
      - name: Send promotion result email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "PipelineIQ ${{ inputs.service_name }} production promotion ${{ needs.promote-prod.result == 'success' && 'SUCCESS' || 'FAILED' }}"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: ${{ secrets.NOTIFY_EMAIL_FROM }}
          body: |
            PipelineIQ ${{ inputs.service_name }} production promotion completed.

            Result: ${{ needs.promote-prod.result }}
            Production Tag: ${{ inputs.prod_image_tag }}

            Workflow Run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
