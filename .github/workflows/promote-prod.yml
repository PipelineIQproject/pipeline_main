name: Promote Image To Production

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: "Service name"
        required: true
        type: string
        default: "frontend"

      image_name:
        description: "ACR image name"
        required: true
        type: string
        default: "final_capstone-frontend"

      chart_path:
        description: "Helm chart path"
        required: true
        type: string
        default: "frontend"

      dev_image_tag:
        description: "Existing dev SHA image tag"
        required: true
        type: string

      prod_image_tag:
        description: "Production semantic tag, example v1.0.0"
        required: true
        type: string

      prod_branch:
        description: "Production branch"
        required: true
        type: string
        default: "main"

jobs:
  promote-prod:
    name: Promote To Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout pipeline_main prod branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.prod_branch }}
          token: ${{ secrets.MAIN_REPO_PAT }}

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Pull dev image, retag as prod, and push
        shell: bash
        run: |
          DEV_IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:${{ inputs.dev_image_tag }}"
          PROD_IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:${{ inputs.prod_image_tag }}"

          docker pull "$DEV_IMAGE"
          docker tag "$DEV_IMAGE" "$PROD_IMAGE"
          docker push "$PROD_IMAGE"

      - name: Update values-prod.yaml
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("${{ inputs.chart_path }}") / "values-prod.yaml"
          repository = "${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}"
          tag = "${{ inputs.prod_image_tag }}"

          lines = path.read_text().splitlines()
          out = []
          in_image = False

          for line in lines:
              stripped = line.strip()

              if stripped == "image:":
                  in_image = True
                  out.append(line)
                  continue

              if in_image and line and not line.startswith((" ", "\t")):
                  in_image = False

              if in_image and stripped.startswith("repository:"):
                  indent = line[:len(line) - len(line.lstrip())]
                  out.append(f"{indent}repository: {repository}")
              elif in_image and stripped.startswith("tag:"):
                  indent = line[:len(line) - len(line.lstrip())]
                  out.append(f"{indent}tag: {tag}")
              else:
                  out.append(line)

          path.write_text("\n".join(out) + "\n")
          PY

      - name: Commit and push prod values
        shell: bash
        run: |
          git config user.name "pipelineiq-ci"
          git config user.email "pipelineiq-ci@users.noreply.github.com"
          git add "${{ inputs.chart_path }}/values-prod.yaml"
          git diff --cached --quiet && exit 0
          git commit -m "ci: promote ${{ inputs.service_name }} image ${{ inputs.prod_image_tag }}"
          git push origin "${{ inputs.prod_branch }}"
